<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder Pro - 300+ Real Components • Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 30px 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
            border-radius: 25px 25px 0 0;
            z-index: 1;
        }

        .title-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #00d4ff, #0099cc, #0077b6, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            animation: gradientShift 3s ease-in-out infinite;
            letter-spacing: -1px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle, .category-title {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700 !important;
            font-size: 1.3rem;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            letter-spacing: 0.5px;
        }

        .subtitle {
            background: rgba(0, 212, 255, 0.1);
            padding: 12px 25px;
            border-radius: 25px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 60% 40%;
            gap: 20px;
            height: calc(100vh - 180px);
            align-items: start;
        }

        .components-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
            scroll-behavior: smooth;
            contain: layout style;
        }

        .components-section::-webkit-scrollbar {
            width: 8px;
        }

        .components-section::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .components-section::-webkit-scrollbar-thumb {
            background: linear-gradient(#00d4ff, #0099cc);
            border-radius: 10px;
        }

        .component-category {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f3460;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            overflow: hidden;
            scroll-margin-top: 20px;
        }

        .category-header {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 204, 0.1));
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
            transition: all 0.3s ease;
            user-select: none;
        }

        .category-header:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 153, 204, 0.2));
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .category-header.active {
            border-bottom: 2px solid #00d4ff;
        }

        .dropdown-icon {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .category-header.active .dropdown-icon {
            transform: rotate(180deg);
        }

        .search-container {
            padding: 20px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #0f3460;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
            color: #ffffff;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .search-input::placeholder {
            color: #a0a0a0;
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .dropdown-content.active {
            max-height: 500px;
            padding: 0 25px 20px;
        }

        .components-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .component-option {
            background: rgba(15, 52, 96, 0.7);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .component-option:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            transform: translateX(5px);
        }

        .component-option.selected {
            border-color: #00d4ff;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 153, 204, 0.2));
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
        }

        .component-option.hidden {
            display: none;
        }

        .component-info {
            flex: 1;
            min-width: 0;
        }

        .component-name {
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .component-specs {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 4px;
        }

        .component-price {
            color: #00d4ff;
            font-size: 1.2rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ENHANCED SIDEBAR */
        .sidebar {
            height: 100%;
            background: linear-gradient(145deg, #1e3a5f 0%, #0f172a 50%, #1e40af 100%);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            gap: 15px;
        }

        .build-stats {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .stat-number {
            color: #00d4ff;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .psu-recommendation {
            background: linear-gradient(135deg, rgba(0, 255, 127, 0.2), rgba(0, 200, 83, 0.1));
            border: 1px solid rgba(0, 255, 127, 0.5);
            color: #00ff7f;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: 600;
        }

        .current-build {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .build-title {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(45deg, #ffffff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .build-items-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .build-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .build-item-name {
            color: #e0e0e0;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .total-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: #00d4ff;
            text-align: center;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            background: linear-gradient(45deg, #00d4ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .build-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .build-btn, .clear-btn, .export-btn {
            width: 100%;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .build-btn:hover, .export-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.6);
        }

        .clear-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52) !important;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4) !important;
        }

        .export-btn {
            background: linear-gradient(45deg, #00ff7f, #00cc66) !important;
            box-shadow: 0 8px 25px rgba(0, 255, 127, 0.4) !important;
        }

        .compatibility-warning, .cooling-warning {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid #ff6666;
            color: #ff9999;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        .cooling-warning {
            background: rgba(255, 193, 7, 0.2);
            border-color: #ffc107;
            color: #fff3cd;
        }

        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; height: auto; }
            .sidebar { position: static; height: auto; }
        }

        @media (max-width: 480px) {
            .container { padding: 10px; }
            h1 { font-size: 1.8rem; }
            .category-header { font-size: 1.3rem; }
            .stat-row { font-size: 0.9rem; }
        }

        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        .no-results {
            text-align: center;
            color: #a0a0a0;
            padding: 40px 20px;
            font-style: italic;
        }

        /* NEW: Price history tooltip */
        .price-history {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .component-option:hover .price-history {
            opacity: 1;
        }
    </style>
</head>

            // NEW: Cooling
            cooling: [
                {name: "NZXT Kraken Z73 360mm AIO", specs: "360mm Radiator, LCD", price: 279, type: "AIO", tdpSupport: 350},
                {name: "Corsair iCUE H150i Elite", specs: "360mm AIO, RGB", price: 259, type: "AIO", tdpSupport: 320},
                {name: "Noctua NH-D15", specs: "Dual Tower Air Cooler", price: 129, type: "Air", tdpSupport: 250},
                {name: "be quiet! Dark Rock Pro 5", specs: "Premium Air Cooler", price: 99, type: "Air", tdpSupport: 250},
            ],
            // NEW: PSU
            psu: [
                {name: "Corsair RM1000x 1000W 80+ Gold", specs: "Fully Modular, 10yr Warranty", price: 169, wattage: 1000, efficiency: "Gold"},
                {name: "Seasonic Prime TX-1300 1300W Titanium", specs: "ATX 3.0, Fully Modular", price: 399, wattage: 1300, efficiency: "Titanium"},
                {name: "EVGA SuperNOVA 850 G7 850W Gold", specs: "Compact, 10yr Warranty", price: 129, wattage: 850, efficiency: "Gold"},
                {name: "Corsair HX1200 Platinum 1200W", specs: "Platinum, Fully Modular", price: 249, wattage: 1200, efficiency: "Platinum"},
            ]
        };

        let currentBuild = {};
        let totalPrice = 0;
        let searchTimeouts = {};

        // Price History Tracking
        function trackPrice(component) {
            const key = `${component.category}-${component.name}`;
            const history = JSON.parse(localStorage.getItem('priceHistory') || '{}');
            const now = Date.now();
            if (!history[key]) history[key] = [];
            
            history[key].push({ price: component.price, date: now });
            // Keep last 5 prices
            if (history[key].length > 5) history[key] = history[key].slice(-5);
            
            localStorage.setItem('priceHistory', JSON.stringify(history));
            return history[key];
        }

        function initComponents() {
            Object.keys(COMPONENTS_DATA).forEach(category => {
                const list = document.getElementById(`${category}-list`);
                COMPONENTS_DATA[category].forEach((comp, index) => {
                    const option = createComponentOption(comp, category, index);
                    list.appendChild(option);
                });
            });
        }

        function createComponentOption(comp, category, index) {
            const div = document.createElement('div');
            div.className = 'component-option';
            div.dataset.category = category;
            div.dataset.name = comp.name;
            div.dataset.price = comp.price;
            div.dataset.index = index;
            if (comp.socket) div.dataset.socket = comp.socket;
            if (comp.brand) div.dataset.brand = comp.brand;
            if (comp.tdp || comp.tdpSupport || comp.wattage) {
                div.dataset.tdp = comp.tdp || comp.tdpSupport || comp.wattage || TDP_VALUES[category];
            }
            
            // Price history tooltip
            const history = trackPrice({category, name: comp.name, price: comp.price});
            const tooltip = document.createElement('div');
            tooltip.className = 'price-history';
            tooltip.textContent = history.length > 1 ? 
                `Price history: $${history[0].price} → $${comp.price}` : 
                `First tracked: $${comp.price}`;
            div.appendChild(tooltip);

            div.innerHTML = `
                <div class="component-info">
                    <div class="component-name">${comp.name}</div>
                    <div class="component-specs">${comp.specs}</div>
                </div>
                <div class="component-price">$${comp.price.toLocaleString()}</div>
            `;
            
            div.addEventListener('click', () => selectComponent(div));
            return div;
        }

        // Debounced search
        function debounceSearch(input, category) {
            clearTimeout(searchTimeouts[category]);
            searchTimeouts[category] = setTimeout(() => performSearch(input, category), 200);
        }

        function performSearch(input, category) {
            const query = input.value.toLowerCase();
            const options = document.querySelectorAll(`#${category}-list .component-option`);
            
            options.forEach(option => {
                const name = option.dataset.name.toLowerCase();
                const specs = option.querySelector('.component-specs')?.textContent.toLowerCase() || '';
                if (name.includes(query) || specs.includes(query)) {
                    option.classList.remove('hidden');
                } else {
                    option.classList.add('hidden');
                }
            });
            
            const list = document.getElementById(`${category}-list`);
            const noResults = list.querySelector('.no-results');
            if (!noResults && query && Array.from(options).every(opt => opt.classList.contains('hidden'))) {
                const msg = document.createElement('div');
                msg.className = 'no-results';
                msg.textContent = 'No components found...';
                list.appendChild(msg);
            } else if (noResults && !query) {
                noResults.remove();
            }
        }

        document.querySelectorAll('.category-header').forEach(header => {
            header.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const content = document.getElementById(targetId);
                const icon = this.querySelector('.dropdown-icon');
                
                this.classList.toggle('active');
                content.classList.toggle('active');
                icon.style.transform = this.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
            });
        });

        document.querySelectorAll('.search-input').forEach(input => {
            input.addEventListener('input', function() {
                const category = this.dataset.search;
                debounceSearch(this, category);
            });
        });

        function selectComponent(option) {
            const category = option.dataset.category;
            const name = option.dataset.name;
            const price = parseInt(option.dataset.price);
            const socket = option.dataset.socket;
            const brand = option.dataset.brand;
            const tdp = parseInt(option.dataset.tdp);

            document.querySelectorAll(`[data-category="${category}"]`).forEach(opt => {
                opt.classList.remove('selected');
            });

            option.classList.add('selected');
            currentBuild[category] = { name, price, socket, brand, tdp };
            updateBuildDisplay();
        }

        function updateBuildDisplay() {
            const buildItems = document.getElementById('build-items');
            const totalPriceEl = document.getElementById('total-price');
            const partsCountEl = document.getElementById('parts-count');
            const wattageEl = document.getElementById('est-wattage');
            const psuRecEl = document.getElementById('psu-recommendation');

            buildItems.innerHTML = '';
            totalPrice = 0;
            let totalWattage = 0;
            const partCount = Object.keys(currentBuild).length;

            Object.entries(currentBuild).forEach(([category, item]) => {
                const div = document.createElement('div');
                div.className = 'build-item';
                div.innerHTML = `
                    <span class="build-item-name">${getCategoryIcon(category)} ${item.name}</span>
                    <span>$${item.price.toLocaleString()}</span>
                `;
                buildItems.appendChild(div);
                totalPrice += item.price;
                totalWattage += item.tdp || TDP_VALUES[category];
            });

            totalPriceEl.textContent = `$${totalPrice.toLocaleString()}`;
            partsCountEl.textContent = partCount;
            wattageEl.textContent = `${totalWattage}W`;
            
            updatePSURecommendation(totalWattage);
            checkCompatibility();
            totalPriceEl.classList.add('pulse');
            setTimeout(() => totalPriceEl.classList.remove('pulse'), 2000);
        }

        function getCategoryIcon(category) {
            const icons = { 
                cpu: '🖥️', motherboard: '🤿', ram: '💾', gpu: '🗜️', 
                storage: '💿', case: '🌀', cooling: '❄️', psu: '🔌' 
            };
            return icons[category] || '⚙️';
        }

        // NEW: PSU Recommendation
        function updatePSURecommendation(wattage) {
            const psuRecEl = document.getElementById('psu-recommendation');
            let recommendation = '';
            
            if (wattage === 0) {
                psuRecEl.style.display = 'none';
                return;
            }
            
            if (wattage < 450) recommendation = '✅ 650W 80+ Gold (Safe)';
            else if (wattage < 650) recommendation = '✅ 850W 80+ Gold (Recommended)';
            else if (wattage < 850) recommendation = '⚠️ 1000W 80+ Platinum (Strong)';
            else recommendation = '🔥 1200W+ Titanium (Beast)';
            
            psuRecEl.innerHTML = `💡 <strong>PSU Recommendation:</strong> ${recommendation}<br>
                <small>Total system: ${wattage}W + 20% headroom</small>`;
            psuRecEl.style.display = 'block';
        }

        // ENHANCED Compatibility Checking
        function checkCompatibility() {
            const warningEl = document.getElementById('compatibility-warning');
            const coolingWarningEl = document.getElementById('cooling-warning');
            const cpu = currentBuild.cpu;
            const motherboard = currentBuild.motherboard;
            const cooling = currentBuild.cooling;

            let warnings = [];

            // Socket compatibility
            if (cpu && motherboard && cpu.socket && motherboard.socket && cpu.socket !== motherboard.socket) {
                warnings.push(`CPU socket <strong>${cpu.socket}</strong> doesn't match motherboard socket <strong>${motherboard.socket}</strong>`);
            }

            // Cooling compatibility
            if (cpu) {
                const cpuTDP = cpu.tdp || TDP_VALUES.cpu.intel;
                if (cpuTDP > 250 && (!cooling || cooling.tdpSupport < cpuTDP)) {
                    warnings.push(`High TDP CPU (${cpuTDP}W) needs better cooling!`);
                }
            }

            if (warnings.length > 0) {
                warningEl.innerHTML = `⚠️ <strong>Compatibility Issues:</strong><br>${warnings.join('<br>')}`;
                warningEl.style.display = 'block';
            } else {
                warningEl.style.display = 'none';
            }

            // Cooling specific warning
            if (cpu && !cooling) {
                const cpuTDP = cpu.tdp || TDP_VALUES.cpu.intel;
                if (cpuTDP > 125) {
                    coolingWarningEl.innerHTML = `🌡️ <strong>Cooling Recommended:</strong> CPU TDP ${cpuTDP}W needs active cooling`;
                    coolingWarningEl.style.display = 'block';
                } else {
                    coolingWarningEl.style.display = 'none';
                }
            } else {
                coolingWarningEl.style.display = 'none';
            }
        }

        // NEW: Export Build
        function exportBuild() {
            if (totalPrice === 0) { 
                alert('Add some components first!'); 
                return; 
            }
            
            const buildText = Object.entries(currentBuild)
                .map(([cat, item]) => `${getCategoryIcon(cat)} ${item.name} - $${item.price.toLocaleString()}`)
                .join('\n');
            
            const exportText = `🔧 PC BUILD TOTAL: $${totalPrice.toLocaleString()}
📊 Parts: ${Object.keys(currentBuild).length} | Power: ${document.getElementById('est-wattage').textContent}

${buildText}

💾 Saved: ${new Date().toLocaleString()}`;
            
            navigator.clipboard.writeText(exportText).then(() => {
                alert('✅ Build copied to clipboard! 📋\n\nPaste anywhere (Discord, Reddit, forums)');
            });
        }

        function saveBuild() {
            if (totalPrice === 0) { alert('Add some components first!'); return; }
            const buildData = { 
                components: currentBuild, 
                total: totalPrice, 
                wattage: document.getElementById('est-wattage').textContent,
                timestamp: new Date().toLocaleString() 
            };
            localStorage.setItem('savedBuild', JSON.stringify(buildData));
            alert('✅ Build saved locally!');
        }

        function clearBuild() {
            if (confirm('Clear entire build?')) {
                currentBuild = {};
                document.querySelectorAll('.component-option').forEach(opt => opt.classList.remove('selected'));
                updateBuildDisplay();
            }
        }

        window.addEventListener('load', () => {
            initComponents();
            const saved = localStorage.getItem('savedBuild');
            if (saved) {
                const buildData = JSON.parse(saved);
                currentBuild = buildData.components;
                Object.entries(currentBuild).forEach(([category, item]) => {
                    const selector = `[data-category="${category}"][data-name="${item.name}"]`;
                    const option = document.querySelector(selector);
                    if (option) option.classList.add('selected');
                });
                totalPrice = buildData.total;
                updateBuildDisplay();
            }
            setTimeout(() => document.querySelector('.category-header').click(), 500);
        });

        // Custom cursor trail
        document.addEventListener('mousemove', (e) => {
            const cursor = document.createElement('div');
            cursor.style.cssText = `position: fixed; left: ${e.clientX}px; top: ${e.clientY}px; width: 4px; height: 4px; background: rgba(0,212,255,0.6); border-radius: 50%; pointer-events: none; z-index: 9999; transition: all 0.1s ease;`;
            document.body.appendChild(cursor);
            setTimeout(() => cursor.remove(), 100);
        });
    </script>
</body>
